<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Help Chatbot — AI Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }

  header {
    background: #1F4E79; color: white;
    padding: 14px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .bot-avatar {
    width: 40px; height: 40px; background: #ffffff30;
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 20px;
  }
  header h1 { font-size: 17px; font-weight: 600; }
  header p  { font-size: 12px; opacity: 0.75; }
  .status-dot {
    width: 8px; height: 8px; background: #4caf50;
    border-radius: 50%; margin-left: auto;
    box-shadow: 0 0 0 2px #ffffff40;
  }

  .main { display: flex; flex: 1; overflow: hidden; }

  .chat-area { flex: 1; display: flex; flex-direction: column; }

  .messages {
    flex: 1; overflow-y: auto;
    padding: 20px; display: flex; flex-direction: column; gap: 12px;
  }

  .msg { display: flex; gap: 8px; max-width: 80%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .msg-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.bot  .msg-avatar { background: #1F4E79; color: white; }
  .msg.user .msg-avatar { background: #e0e0e0; }

  .bubble {
    padding: 10px 14px; border-radius: 16px;
    font-size: 14px; line-height: 1.5;
  }
  .msg.bot  .bubble { background: white; color: #1a1a2e; border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: #1F4E79; color: white; border-bottom-right-radius: 4px; }

  .intent-badge {
    font-size: 10px; padding: 2px 8px;
    border-radius: 10px; background: #e8f0fe;
    color: #1F4E79; margin-top: 4px; display: inline-block;
  }
  .confidence { font-size: 10px; color: #aaa; margin-top: 2px; }

  .quick-replies {
    padding: 8px 20px; display: flex; gap: 8px; flex-wrap: wrap;
  }
  .qr-btn {
    background: white; border: 1px solid #1F4E79;
    color: #1F4E79; border-radius: 20px;
    padding: 6px 14px; font-size: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .qr-btn:hover { background: #1F4E79; color: white; }

  .input-area {
    padding: 12px 16px; background: white;
    border-top: 1px solid #e0e0e0;
    display: flex; gap: 10px; align-items: center;
  }
  .input-area input {
    flex: 1; padding: 10px 16px;
    border: 1px solid #ddd; border-radius: 24px;
    font-size: 14px; outline: none;
  }
  .input-area input:focus { border-color: #1F4E79; }
  .send-btn {
    background: #1F4E79; color: white;
    border: none; border-radius: 50%;
    width: 40px; height: 40px;
    font-size: 16px; cursor: pointer;
  }
  .send-btn:hover { background: #163d5e; }

  .sidebar {
    width: 260px; background: white;
    border-left: 1px solid #e0e0e0;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar h3 {
    padding: 14px 16px; font-size: 13px;
    font-weight: 600; color: #1F4E79;
    border-bottom: 1px solid #f0f0f0;
  }
  .stat-row {
    display: flex; justify-content: space-between;
    padding: 10px 16px; font-size: 13px;
    border-bottom: 1px solid #f9f9f9;
  }
  .stat-row .val { font-weight: 700; color: #1F4E79; }

  .intent-list { padding: 8px 16px; flex: 1; overflow-y: auto; }
  .intent-row {
    display: flex; justify-content: space-between;
    align-items: center; padding: 6px 0;
    border-bottom: 1px solid #f5f5f5; font-size: 12px;
  }
  .intent-count {
    background: #e8f0fe; color: #1F4E79;
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
  }

  .typing {
    display: flex; gap: 4px; padding: 10px 14px;
    background: white; border-radius: 16px;
    border-bottom-left-radius: 4px; width: fit-content;
  }
  .dot {
    width: 7px; height: 7px; background: #aaa;
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }
</style>
</head>
<body>

<header>
  <div class="bot-avatar">&#129302;</div>
  <div>
    <h1>Student Help Assistant</h1>
    <p>AI-powered academic chatbot</p>
  </div>
  <div class="status-dot"></div>
</header>

<div class="main">
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="msg bot">
        <div class="msg-avatar">&#129302;</div>
        <div>
          <div class="bubble">
            Hello! I am your Student Help Assistant powered by AI. I can help you with
            <strong>fees, exams, admissions, library, hostel</strong> and
            <strong>placements</strong>. What would you like to know?
          </div>
        </div>
      </div>
    </div>

    <div class="quick-replies">
      <button class="qr-btn" onclick="sendQuick('What are the exam dates?')">Exam dates</button>
      <button class="qr-btn" onclick="sendQuick('How do I pay fees?')">Fee payment</button>
      <button class="qr-btn" onclick="sendQuick('Tell me about admissions')">Admissions</button>
      <button class="qr-btn" onclick="sendQuick('Library timings')">Library</button>
      <button class="qr-btn" onclick="sendQuick('Placement information')">Placements</button>
      <button class="qr-btn" onclick="sendQuick('Hostel facilities')">Hostel</button>
    </div>

    <div class="input-area">
      <input type="text" id="user-input"
             placeholder="Type your question here..."
             onkeypress="if(event.key==='Enter') sendMessage()"/>
      <button class="send-btn" onclick="sendMessage()">&#10148;</button>
    </div>
  </div>

  <div class="sidebar">
    <h3>Chat Analytics</h3>
    <div class="stat-row">
      <span>Total chats</span>
      <span class="val" id="total-chats">0</span>
    </div>
    <div class="stat-row">
      <span>This session</span>
      <span class="val" id="session-count">0</span>
    </div>
    <h3 style="margin-top:8px">Top topics</h3>
    <div class="intent-list" id="intent-list">
      <div style="color:#aaa;font-size:12px">No data yet</div>
    </div>
  </div>
</div>

<script>
let sessionCount = 0;

function addMessage(text, sender, intent, confidence) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  const avatar = sender === 'bot' ? '&#129302;' : '&#128100;';
  let extra = '';
  if (sender === 'bot' && intent && intent !== 'unknown') {
    extra = `<div class="intent-badge">Intent: ${intent}</div>
             <div class="confidence">Confidence: ${Math.round(confidence * 100)}%</div>`;
  }
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div>
      <div class="bubble">${text}</div>
      ${extra}
    </div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar">&#129302;</div>
    <div class="typing">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMessage(msg, 'user');
  showTyping();
  await new Promise(r => setTimeout(r, 600));
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();
    removeTyping();
    addMessage(data.response, 'bot', data.intent, data.confidence);
    sessionCount++;
    document.getElementById('session-count').textContent = sessionCount;
    loadStats();
  } catch(e) {
    removeTyping();
    addMessage('Sorry, something went wrong. Please try again.', 'bot');
  }
}

function sendQuick(msg) {
  document.getElementById('user-input').value = msg;
  sendMessage();
}

async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('total-chats').textContent = data.total_chats;
    const list = document.getElementById('intent-list');
    if (!data.top_intents.length) return;
    list.innerHTML = data.top_intents.map(i => `
      <div class="intent-row">
        <span>${i.intent_matched}</span>
        <span class="intent-count">${i.count}</span>
      </div>
    `).join('');
  } catch(e) {}
}

loadStats();
</script>
</body>
</html>
