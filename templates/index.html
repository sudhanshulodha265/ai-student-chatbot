<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Help Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-dark: #07060f;
    --purple-mid: #6b21d6;
    --purple-light: #a855f7;
    --pink-glow: #d4648a;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --text-primary: #f0ecff;
    --text-secondary: rgba(220,210,255,0.6);
    --text-hint: rgba(200,190,255,0.35);
    --input-bg: rgba(255,255,255,0.06);
    --bubble-bot: rgba(255,255,255,0.07);
    --bubble-user: rgba(168,85,247,0.3);
    --accent: #a855f7;
    --accent-bright: #c084fc;
  }

  html, body { height: 100%; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

  body { background: var(--bg-dark); position: relative; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 65% 60% at 0% 100%, rgba(212,100,138,0.5) 0%, transparent 58%),
      radial-gradient(ellipse 55% 65% at 12% 85%, rgba(90,40,190,0.6) 0%, transparent 55%),
      radial-gradient(ellipse 75% 70% at 100% 100%, rgba(130,50,220,0.6) 0%, transparent 58%),
      radial-gradient(ellipse 45% 45% at 85% 55%, rgba(168,85,247,0.25) 0%, transparent 50%),
      linear-gradient(180deg, #07060f 0%, #0d0918 100%);
    pointer-events: none; z-index: 0;
    animation: bgShift 14s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0%   { opacity: 1; }
    100% { opacity: 0.88; filter: hue-rotate(12deg) brightness(1.05); }
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.5;
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 28px 20px; gap: 14px;
  }

  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: 34px;
    background: linear-gradient(135deg, #e0d0ff 0%, #a855f7 45%, #d4648a 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    letter-spacing: -0.3px; text-align: center;
  }

  .chat-card {
    width: 100%; max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 28px;
    backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
    display: flex; flex-direction: column;
    min-height: 520px; max-height: 78vh;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(168,85,247,0.1),
      0 28px 80px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.07);
  }

  .messages-area {
    flex: 1; overflow-y: auto;
    padding: 32px 20px 16px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  .messages-area::-webkit-scrollbar { width: 0; }

  .welcome-block {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; gap: 12px; padding: 20px 0 10px; text-align: center;
  }

  .welcome-icon {
    width: 52px; height: 52px; border-radius: 16px;
    background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(212,100,138,0.25));
    border: 1px solid rgba(168,85,247,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin-bottom: 4px;
    animation: iconGlow 3s ease-in-out infinite alternate;
  }

  @keyframes iconGlow {
    0%   { box-shadow: 0 0 20px rgba(168,85,247,0.2); }
    100% { box-shadow: 0 0 36px rgba(168,85,247,0.45); }
  }

  .welcome-title {
    font-family: 'DM Serif Display', serif; font-style: italic;
    font-size: 21px; color: var(--text-primary);
  }

  .welcome-text {
    font-size: 13.5px; color: var(--text-secondary);
    line-height: 1.7; max-width: 270px;
  }

  .msg-row { display: flex; flex-direction: column; animation: fadeUp 0.28s ease forwards; }
  .msg-row.user { align-items: flex-end; }
  .msg-row.bot  { align-items: flex-start; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble {
    max-width: 82%; padding: 11px 15px;
    border-radius: 18px; font-size: 14px; line-height: 1.6; font-weight: 400;
  }

  .bubble.bot {
    background: var(--bubble-bot);
    border: 1px solid rgba(255,255,255,0.07);
    color: var(--text-primary); border-bottom-left-radius: 5px;
  }

  .bubble.user {
    background: var(--bubble-user);
    border: 1px solid rgba(168,85,247,0.3);
    color: var(--text-primary); border-bottom-right-radius: 5px;
    box-shadow: 0 0 20px rgba(168,85,247,0.15);
  }

  .intent-tag {
    display: inline-block; font-size: 10px; padding: 2px 9px;
    border-radius: 20px; background: rgba(168,85,247,0.15);
    border: 1px solid rgba(168,85,247,0.25); color: var(--accent-bright);
    margin-top: 5px; font-weight: 500; letter-spacing: 0.03em;
  }

  .typing-row { display: flex; animation: fadeUp 0.28s ease forwards; }
  .typing-bubble {
    background: var(--bubble-bot); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px; border-bottom-left-radius: 5px;
    padding: 13px 16px; display: flex; gap: 5px; align-items: center;
  }
  .dot {
    width: 6px; height: 6px; background: var(--text-hint);
    border-radius: 50%; animation: typeBounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typeBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .quick-wrap {
    padding: 4px 20px 14px;
    display: flex; flex-wrap: wrap; gap: 7px;
  }

  .qr {
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 6px 13px;
    cursor: pointer; transition: all 0.2s; backdrop-filter: blur(8px);
  }
  .qr:hover {
    background: rgba(168,85,247,0.2); border-color: rgba(168,85,247,0.4);
    color: var(--accent-bright); transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(168,85,247,0.15);
  }

  .input-wrap {
    padding: 10px 16px 18px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .input-box {
    background: var(--input-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 10px 12px 10px 16px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.2s;
  }
  .input-box:focus-within {
    border-color: rgba(168,85,247,0.4);
    box-shadow: 0 0 0 3px rgba(168,85,247,0.08);
  }

  .input-box input {
    background: transparent; border: none; outline: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: var(--text-primary); width: 100%;
  }
  .input-box input::placeholder { color: var(--text-hint); }

  .input-actions { display: flex; align-items: center; gap: 8px; }

  .act-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-hint); display: flex; align-items: center;
    justify-content: center; transition: color 0.2s; padding: 2px;
  }
  .act-btn:hover { color: var(--accent-bright); }
  .act-btn svg { width: 17px; height: 17px; }

  .search-pill {
    display: flex; align-items: center; gap: 5px;
    font-family: 'DM Sans', sans-serif; font-size: 12.5px;
    color: var(--text-hint); background: transparent;
    border: none; cursor: pointer; padding: 0; transition: color 0.2s;
  }
  .search-pill:hover { color: var(--accent-bright); }
  .search-pill svg { width: 14px; height: 14px; }

  .send-btn {
    margin-left: auto; width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--purple-mid), var(--pink-glow));
    border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    box-shadow: 0 0 18px rgba(168,85,247,0.4);
  }
  .send-btn:hover { transform: scale(1.1); box-shadow: 0 0 28px rgba(168,85,247,0.6); }
  .send-btn svg { width: 15px; height: 15px; }

  .stats-row { display: flex; gap: 10px; width: 100%; max-width: 420px; }

  .stat-card {
    flex: 1; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px; padding: 14px 16px;
    backdrop-filter: blur(16px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .stat-label {
    font-size: 10px; color: var(--text-hint);
    letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px;
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 24px; color: var(--text-primary); line-height: 1;
  }

  .stat-value.sm {
    font-size: 14px; padding-top: 5px;
    color: var(--accent-bright);
    font-family: 'DM Sans', sans-serif; font-weight: 400;
  }

  .page-sub { font-size: 13px; color: var(--text-hint); text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<div class="page">

  <p class="page-title">AI Chat</p>

  <div class="chat-card">

    <div class="messages-area" id="messages-area">
      <div class="welcome-block" id="welcome-block">
        <div class="welcome-icon">&#129302;</div>
        <div class="welcome-title">Hello there</div>
        <p class="welcome-text">Ask me anything about fees, exams, admissions, library, hostel or placements.</p>
      </div>
    </div>

    <div class="quick-wrap">
      <button class="qr" onclick="sendQuick('How do I pay fees?')">Fees</button>
      <button class="qr" onclick="sendQuick('When are the exams?')">Exams</button>
      <button class="qr" onclick="sendQuick('Tell me about admissions')">Admissions</button>
      <button class="qr" onclick="sendQuick('Library timings')">Library</button>
      <button class="qr" onclick="sendQuick('Placement info')">Placements</button>
      <button class="qr" onclick="sendQuick('Hostel facilities')">Hostel</button>
    </div>

    <div class="input-wrap">
      <div class="input-box">
        <input type="text" id="user-input"
               placeholder="Ask your question..."
               onkeypress="if(event.key==='Enter') sendMessage()"/>
        <div class="input-actions">

          <button class="act-btn" title="Attach">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
          </button>

          <button class="search-pill" title="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            Search
          </button>

          <button class="act-btn" title="Voice">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>

          <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>

        </div>
      </div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total chats</div>
      <div class="stat-value" id="total-chats">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This session</div>
      <div class="stat-value" id="session-count">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Top topic</div>
      <div class="stat-value sm" id="top-topic">—</div>
    </div>
  </div>

  <p class="page-sub">AI chat UI with threads, prompts, and quick actions.</p>

</div>

<script>
let sessionCount = 0;
let firstMsg = true;

function addMessage(text, sender, intent) {
  if (firstMsg) {
    const wb = document.getElementById('welcome-block');
    if (wb) wb.remove();
    firstMsg = false;
  }
  const area = document.getElementById('messages-area');
  const row = document.createElement('div');
  row.className = `msg-row ${sender}`;
  const bubble = document.createElement('div');
  bubble.className = `bubble ${sender}`;
  bubble.textContent = text;
  if (sender === 'bot' && intent && intent !== 'unknown') {
    const tag = document.createElement('div');
    tag.className = 'intent-tag';
    tag.textContent = intent;
    bubble.appendChild(tag);
  }
  row.appendChild(bubble);
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('messages-area');
  const row = document.createElement('div');
  row.className = 'typing-row'; row.id = 'typing';
  row.innerHTML = `<div class="typing-bubble">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMessage(msg, 'user');
  showTyping();
  await new Promise(r => setTimeout(r, 650));
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();
    removeTyping();
    addMessage(data.response, 'bot', data.intent);
    sessionCount++;
    document.getElementById('session-count').textContent = sessionCount;
    loadStats();
  } catch(e) {
    removeTyping();
    addMessage("Couldn't connect. Please try again.", 'bot');
  }
}

function sendQuick(msg) {
  document.getElementById('user-input').value = msg;
  sendMessage();
}

async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('total-chats').textContent = data.total_chats;
    if (data.top_intents && data.top_intents.length) {
      document.getElementById('top-topic').textContent = data.top_intents[0].intent_matched;
    }
  } catch(e) {}
}

loadStats();
</script>
</body>
</html>
